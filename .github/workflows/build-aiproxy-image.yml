name: Build and Push Aiproxy Image

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/coder-glzhu/new-api

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          # Always derive base version from upstream official tags.
          git fetch --force https://github.com/Calcium-Ion/new-api.git "refs/tags/*:refs/tags/upstream/*"
          OFFICIAL_TAG="$(git describe --tags --abbrev=0 --match 'upstream/v*' 2>/dev/null || true)"
          if [ -z "$OFFICIAL_TAG" ]; then
            OFFICIAL_TAG="$(git describe --tags --abbrev=0 --match 'upstream/*' 2>/dev/null || echo 'upstream/untagged')"
          fi
          OFFICIAL_TAG="${OFFICIAL_TAG#upstream/}"
          SHORT_SHA="$(git rev-parse --short=12 HEAD)"
          VERSION="${OFFICIAL_TAG}+${SHORT_SHA}"
          DOCKER_TAG="${OFFICIAL_TAG}-${SHORT_SHA}"
          echo "$VERSION" > VERSION
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$DOCKER_TAG" >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Building version: $VERSION"
          echo "Docker tag: $DOCKER_TAG"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=${{ steps.version.outputs.tag }}
            type=raw,value=latest

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: read
      packages: read
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            docker compose pull new-api
            docker compose up -d --force-recreate new-api
            docker image prune -f
