root = "."
tmp_dir = ".air-tmp"

[build]
  cmd = "go build -o .air-tmp/new-api ."
  delay = 1000
  entrypoint = [".air-tmp/new-api"]
  exclude_dir = [
    ".air-tmp",
    ".dev-logs",
    ".git",
    ".gomodcache",
    ".gopath",
    "bin",
    "data",
    "docs",
    "electron",
    "logs",
    "web",
  ]
  exclude_file = []
  exclude_regex = ["_test\\.go"]
  exclude_unchanged = true
  follow_symlink = false
  full_bin = ""
  include_dir = []
  include_ext = ["go", "yaml", "yml"]
  kill_delay = "500ms"
  log = "build-errors.log"
  poll = false
  rerun = false
  rerun_delay = 500
  send_interrupt = true
  stop_on_error = true

[log]
  main_only = false
  time = true

[misc]
  clean_on_exit = true

[screen]
  clear_on_rebuild = false
  keep_scroll = true
